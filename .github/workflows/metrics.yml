name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq (only)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate GitHub Metrics (Calendar + Spotify + AniList)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.full.svg
          output_action: commit
          base: ""
          config_timezone: America/Sao_Paulo

          # Commits
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Spotify
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: playlist
          plugin_music_playlist: 0KHrbMfDXbQ7Bn4oW0W0jI
          plugin_music_limit: 3

          # AniList
          plugin_anilist: yes
          plugin_anilist_user: mairink
          plugin_anilist_sections: favorites
