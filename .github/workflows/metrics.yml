name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  metrics-left:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mairinkdev
          template: classic
          filename: metrics.left.svg
          base: activity
          config_timezone: America/Sao_Paulo

  metrics-right:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mairinkdev
          template: classic
          filename: metrics.right.svg
          base: "" 
          config_timezone: America/Sao_Paulo
          plugin_anilist: yes
          plugin_anilist_user: arthurmairink
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites
